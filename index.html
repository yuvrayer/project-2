<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

	<script src='https://cdn.plot.ly/plotly-2.35.2.min.js'></script>


    <link rel="stylesheet" href="assets/css/style.css">
    <script defer src="assets/js/app.js"></script>
</head>

<body>

    <h1>My Currency Rates Website</h1><br>
    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="coins-click-tab" data-bs-toggle="tab" data-bs-target="#coins-tab"
                type="button" role="tab" aria-controls="coins-tab" aria-selected="true">Coins</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="reports-click-tab" data-bs-toggle="tab" data-bs-target="#reports-tab"
                type="button" role="tab" aria-controls="reports-tab" aria-selected="false">Reports</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="about-click-tab" data-bs-toggle="tab" data-bs-target="#about-tab" type="button"
                role="tab" aria-controls="about-tab" aria-selected="false">About</button>
        </li>
        <li style="width: 30px;"></li>
        <input id="searchInput" placeholder="search by specific ID..." />
        <button id="searchButton">search</button>
    </ul>
    <div class="tab-content">
        <div class="tab-pane fade show active" id="coins-tab" role="tabpanel" aria-labelledby="home-tab" tabindex="0">

            <div id="coinsTabPresentation" style="display: flex; flex-wrap: wrap;"></div>

            <div class="modal fade" id="5coinsModal" tabindex="-1" aria-labelledby="exampleModalLabel">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5">Error: you already selected 5 coins to
                                track, please click on a coin to replace with the selected coin, or click "close"</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body" style="display: flex; flex-wrap: wrap;">
                            <div class="card" id="choice1" style="margin: 3px; padding: 3px;"></div> 
                            <div class="card" id="choice2" style="margin: 3px; padding: 3px;"></div> 
                            <div class="card" id="choice3" style="margin: 3px; padding: 3px;"></div> 
                            <div class="card" id="choice4" style="margin: 3px; padding: 3px;"></div> 
                            <div class="card" id="choice5" style="margin: 3px; padding: 3px;"></div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                                id="choicesClosed">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center" id="loadingDiv" style="visibility: hidden; position: absolute; top: 10px; width: 100vw; height: 100vh; background-color: white;">
            <div class="spinner-border" role="status" style="width: 100px; height: 100px;"></div>
            <div style="position: absolute; top: 130px; font-size: 40px;">loading...</div>
        </div>

        <div class="tab-pane fade" id="reports-tab" role="tabpanel" aria-labelledby="profile-tab" tabindex="0">
            here is the graph for the coins you selected to track after:
            <div id="graphDiv"></div>
        </div>
        <div class="tab-pane fade" id="about-tab" role="tabpanel" aria-labelledby="contact-tab" tabindex="0">
            
            <div id="aboutPage" style="padding: 10px;"></div>
        </div>
    </div>

</body>

</html>
